name: Test, Scan and Analyze Frontend

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  rubocop:
    name: Run RuboCop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
      - name: Install Dependencies
        run: bundle install
      - name: Run RuboCop
        run: bundle exec rubocop --fail-level F

  check-sonar-secret:
    name: Check SONAR TOKEN presence
    runs-on: ubuntu-latest
    outputs:
      has_sonar_token: ${{ steps.check_token.outputs.has_sonar_token }}
    steps:
      - name: Check SONAR_TOKEN presence
        id: check_token
        run: |
          if [[ ! -z "${SONAR_TOKEN}" ]]; then
            echo "has_sonar_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_sonar_token=false" >> $GITHUB_OUTPUT
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_OUTPUT: ${{ github.output }}

  run-sonarcloud-analysis:
    name: Run SonarCloud Analysis
    needs: [check-sonar-secret, rubocop] # This ensures RuboCop runs before SonarCloud analysis
    runs-on: ubuntu-latest
    if: needs.check-sonar-secret.outputs.has_sonar_token == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
